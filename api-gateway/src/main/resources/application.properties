spring.cloud.gateway.routes[7].predicates[0]=Path=/docs-payment/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[8].id=notification-docs
spring.cloud.gateway.routes[8].uri=lb://notification-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/docs-notification/**
