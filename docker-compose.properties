version=3.8

# Eureka Server
services.eureka-server.build=./eureka-server
services.eureka-server.ports[0]=8761:8761
services.eureka-server.networks[0]=freelencer-net

# API Gateway
services.api-gateway.build=./api-gateway
services.api-gateway.ports[0]=8080:8080
services.api-gateway.depends_on[0]=eureka-server
services.api-gateway.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.api-gateway.networks[0]=freelencer-net

# Auth Service
services.auth-service.build=./auth-service
services.auth-service.ports[0]=8081:8081
services.auth-service.depends_on[0]=eureka-server
services.auth-service.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.auth-service.networks[0]=freelencer-net

# User Service
services.user-service.build=./user-service
services.user-service.ports[0]=8082:8082
services.user-service.depends_on[0]=eureka-server
services.user-service.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.user-service.networks[0]=freelencer-net

# Project Service
services.project-service.build=./project-service
services.project-service.ports[0]=8083:8083
services.project-service.depends_on[0]=eureka-server
services.project-service.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.project-service.networks[0]=freelencer-net

# Payment Service
services.payment-service.build=./payment-service
services.payment-service.ports[0]=8084:8084
services.payment-service.depends_on[0]=eureka-server
services.payment-service.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.payment-service.networks[0]=freelencer-net

# Notification Service
services.notification-service.build=./notification-service
services.notification-service.ports[0]=8085:8085
services.notification-service.depends_on[0]=eureka-server
services.notification-service.environment[0]=EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
services.notification-service.networks[0]=freelencer-net

# Networks
networks.freelencer-net.driver=bridge
